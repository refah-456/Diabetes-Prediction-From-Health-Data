<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diabetes Prediction</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1>🩺 Diabetes Prediction</h1>
    <p class="subtitle">Enter patient details to predict diabetes risk</p>

    <form id="prediction-form" class="form-grid">

        <input type="number" name="Pregnancies" placeholder="Pregnancies" required>
        <input type="number" name="Glucose" placeholder="Glucose" required>

        <input type="number" name="BloodPressure" placeholder="Blood Pressure" required>
        <input type="number" name="SkinThickness" placeholder="Skin Thickness" required>

        <input type="number" name="Insulin" placeholder="Insulin" required>
        <input type="number" step="0.1" name="BMI" placeholder="BMI" required>

        <input type="number" step="0.001" name="DiabetesPedigreeFunction" placeholder="DPF" required>
        <input type="number" name="Age" placeholder="Age" required>

        <button type="submit">🔍 Predict</button>

        <div id="error-msg" class="error"></div>
        <div id="result-container" class="result" id="1"></div>
        <div id="health-tips" class="tips"></div>
        <div id="feature-importance" class="feature-box"></div>

    </form>
</div>

<script src="script.js"></script>
</body>
</html>
